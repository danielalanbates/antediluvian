<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Antediluvian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a0a2e;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a0a2e 0%, #4a1a5e 50%, #2a0a3e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        
        #start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff6b35, 0 0 40px #ff6b35;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #ff6b35, 0 0 40px #ff6b35; }
            to { text-shadow: 0 0 30px #ff6b35, 0 0 60px #ff6b35; }
        }
        
        #start-screen p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        
        #start-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(180deg, #ff6b35 0%, #c94a1a 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
            transition: transform 0.2s;
        }
        
        #start-btn:active {
            transform: scale(0.95);
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 5;
            display: none;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        
        #game-over h2 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #ff4444;
        }
        
        #final-score {
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-display">Score: <span id="score">0</span></div>
        
        <div id="start-screen">
            <h1>ANTEDILUVIAN</h1>
            <p>Survive the prehistoric chaos!</p>
            <button id="start-btn">TAP TO START</button>
        </div>
        
        <div id="game-over">
            <h2>GAME OVER</h2>
            <div id="final-score">Score: 0</div>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
